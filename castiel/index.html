
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Index</title>
<style>
  :root {
    --bg: #fafafa;
    --text: #1a1a1a;
    --muted: #6b6b6b;
    --line: #e2e2e2;
    --accent: #1a1a1a;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    padding: 4rem 1.5rem;
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
    display: flex;
    justify-content: center;
  }
  main {
    width: 100%;
    max-width: 480px;
  }
  h1 {
    font-size: 1.1rem;
    font-weight: 600;
    letter-spacing: 0.02em;
    text-transform: uppercase;
    color: var(--muted);
    margin: 0 0 2rem 0;
  }
  ul {
    list-style: none;
    margin: 0;
    padding: 0;
  }
  li {
    border-bottom: 1px solid var(--line);
  }
  li:first-child {
    border-top: 1px solid var(--line);
  }
  a {
    display: block;
    padding: 0.9rem 0.2rem;
    color: var(--text);
    text-decoration: none;
    font-size: 1rem;
    transition: color 0.15s ease, padding-left 0.15s ease;
  }
  a:hover {
    color: var(--accent);
    padding-left: 0.5rem;
  }
  footer {
    margin-top: 3rem;
    font-size: 0.8rem;
    color: var(--muted);
  }
</style>
</head>
<body>
<main>
  <h1>Index</h1>
  <ul>
    <li><a href="https://example.com/one">Link One</a></li>
    <li><a href="https://example.com/two">Link Two</a></li>
    <li><a href="https://example.com/three">Link Three</a></li>
    <li><a href="https://example.com/four">Link Four</a></li>
    <li><a href="https://example.com/five">Link Five</a></li>
    <li><a href="https://example.com/six">Link Six</a></li>
    <li><a href="https://example.com/seven">Link Seven</a></li>
    <li><a href="https://example.com/eight">Link Eight</a></li>
    <li><a href="https://example.com/nine">Link Nine</a></li>
    <li><a href="https://example.com/ten">Link Ten</a></li>
  </ul>
  <footer>Updated 2026</footer>
</main>
</body>
</html>
